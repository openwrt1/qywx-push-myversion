name: Auto Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 允许 GitHub Actions 将构建好的镜像推送到 GitHub Packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Lowercase repository name
        id: repo-name
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.repo-name.outputs.image }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22 # 比如 2222，如果是22则不需要加这一行
          script: |
            # 让 VPS 登录到 GitHub 镜像仓库，以便能拉取刚刚构建好的镜像
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            cd /root
            # 如果没有代码仓库，就自动 clone 一份
            if [ ! -d "qywx-push-myversion/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git qywx-push-myversion
            fi
            cd qywx-push-myversion
            git config --global --add safe.directory /root/qywx-push-myversion
            git pull
            
            # 将构建好的镜像名称写入 .env 文件，供 docker-compose 读取
            echo "IMAGE_NAME=${{ steps.repo-name.outputs.image }}" > .env
            
            docker-compose down
            docker-compose pull
            docker-compose up -d
            
            # 自动清理 VPS 上旧的废弃镜像，防止 VPS 磁盘空间爆满
            docker image prune -f
